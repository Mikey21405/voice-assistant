server.port=8080
spring.application.name=spring-demo

spring.datasource.url=jdbc:mysql://120.26.38.110:13306/voice_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.example.agent=DEBUG

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.example.voice_assistant.entity

dashscope.api.key=${DASH_API_KEY}
dashscope.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
dashscope.model=qwen3.5-flash
dashscope.embedding.model=text-embedding-v1

# Milvus 配置
milvus.host=localhost
milvus.port=19530
milvus.username=
milvus.password=
milvus.database=default
milvus.timeout=10000

# 文件上传配置
file.upload.path=./uploads
file.upload.allowed-extensions=txt,md,docx

# QWeather API 配置
qweather.api.key=${QWEATHER_API_KEY}
qweather.geo.url=https://mw759h8ynx.re.qweatherapi.com/geo/v2/city/lookup
qweather.weather.url=https://mw759h8ynx.re.qweatherapi.com/v7/weather/now

# RAG配置
rag.enabled=true
rag.auto-route=true
rag.min-score=0.55
rag.topK=5